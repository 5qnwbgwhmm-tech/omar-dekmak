<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Manessa ❤️</title>
<style>
body{
    margin:0;
    text-align:center;
    background:linear-gradient(to bottom,#8b0000,#ff0000);
    font-family:Arial, sans-serif;
    overflow:hidden;
    color:white;
}

h1{
    margin-top:60px;
    font-size:50px;
}

#message{
    font-size:22px;
    width:70%;
    margin:auto;
    min-height:60px;
}

button{
    padding:15px 35px;
    font-size:20px;
    margin:20px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    transition:0.3s;
    z-index:1000;
    position:relative;
}

#yesBtn{
    background:white;
    color:#b30000;
}
#yesBtn:hover{
    transform:scale(1.1);
}
#noBtn{
    background:#4d0000;
    color:white;
    position:absolute;
    cursor:pointer;
}

.heart{
    position:fixed;
    bottom:-20px;
    font-size:20px;
    animation:float 6s linear infinite;
    z-index:999;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-900px);opacity:0;}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* FINAL SCREEN */
#finalScreen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    text-align:center;
    z-index:2000;
    overflow:hidden;
}

#finalText{
    position:relative;
    z-index:2;
    padding-top:200px;
    font-size:55px;
    color:#ff2e63;
    text-shadow:0 0 20px #ff0000, 0 0 40px #ff4f81;
    animation: glow 1.5s ease-in-out infinite alternate;
}

@keyframes glow{
    from {text-shadow:0 0 20px #ff0000,0 0 40px #ff4f81;}
    to {text-shadow:0 0 40px #ff2e63,0 0 60px #ff6b8a;}
}

</style>
</head>
<body>

<h1>Manessa will you be my girlfriend ❤️</h1>

<div id="countdown"></div>
<br>
<div id="message"></div>
<br>

<button id="yesBtn">Yes 💕</button> 
<button id="noBtn">No 😅</button>

<!-- MP3 Audio -->


<canvas id="fireworks"></canvas>

<!-- Final screen -->
<div id="finalScreen">
    <div id="finalText">❤️ Manessa... I love you ❤️</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Typewriter message
    const text = "Manessa... From the first time we started talking, you felt different to me. You make my days better without even trying. I don’t know what the future holds, but I know I want to build something real with you. And I’m glad it’s with you. ❤️";
    let i = 0;
    function typeWriter(){
        if(i < text.length){
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter,40);
        }
    }
    typeWriter();

    // Countdown
    const todayEnd = new Date();
    todayEnd.setHours(23,59,59);
    function updateCountdown(){
        const now = new Date();
        const diff = todayEnd - now;
        const hours = Math.floor(diff/1000/60/60);
        const minutes = Math.floor((diff/1000/60)%60);
        const seconds = Math.floor((diff/1000)%60);
        document.getElementById("countdown").innerHTML =
        "Time left today: "+hours+"h "+minutes+"m "+seconds+"s";
    }
    setInterval(updateCountdown,1000);

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const music = document.getElementById("music");

    // NO button moves
    function moveNoUnlimited() {
        const maxX = window.innerWidth - noBtn.offsetWidth;
        const maxY = window.innerHeight - noBtn.offsetHeight;
        noBtn.style.left = Math.random() * maxX + "px";
        noBtn.style.top = Math.random() * maxY + "px";
    }
    noBtn.addEventListener("mouseenter", moveNoUnlimited);
    noBtn.addEventListener("click", function(e){
        e.preventDefault();
        moveNoUnlimited();
    });

    // Hearts animation
    function createHeart(){
        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.fontSize=Math.random()*20+15+"px";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),6000);
    }
    setInterval(createHeart,300);

    // Fireworks
    const canvas=document.getElementById("fireworks");
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    let particles=[];

    function createFirework(){
        const x=Math.random()*canvas.width;
        const y=Math.random()*canvas.height;
        for(let i=0;i<80;i++){
            particles.push({
                x:x, y:y,
                dx:(Math.random()-0.5)*7,
                dy:(Math.random()-0.5)*7,
                life:100
            });
        }
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach((p,index)=>{
            ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
            ctx.fillRect(p.x,p.y,4,4);
            p.x+=p.dx;
            p.y+=p.dy;
            p.life--;
            if(p.life<=0) particles.splice(index,1);
        });
        requestAnimationFrame(animate);
    }

    // YES button action
    function yesAction() {
        // Play MP3
       
        // Fireworks
        setInterval(createFirework, 400);
        animate();

        // Hide initial elements
        document.querySelector("h1").style.display = "none";
        document.getElementById("countdown").style.display = "none";
        document.getElementById("message").style.display = "none";
        yesBtn.style.display = "none";
        noBtn.style.display = "none";

        // Show final screen
        document.getElementById("finalScreen").style.display = "block";
    }
    yesBtn.addEventListener("click", yesAction);
});
</script>

</body>
</html>
